name: Build Signed Release APK

on:
  # push:
  #   branches: [ main ]
  workflow_dispatch:  # تبقي هذا الخيار لتشغيل البناء يدوياً عند الحاجة

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass ${{ secrets.KEYSTORE_PASSWORD }} -keypass ${{ secrets.KEY_PASSWORD }} -dname "CN=CryptoSafe, OU=, O=, L=, S=, C="

      - name: Build Release APK
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.10.2   # <-- هذا السطر يحل مشكلة Gradle 9
          arguments: assembleRelease
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: release
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CryptoSafe-Release
          path: app/build/outputs/apk/release/*.apk
