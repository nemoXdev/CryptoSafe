name: Build & Sign Release APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        
      - name: Generate Temporary Keystore
        run: |
          keytool -genkeypair -v \
          -keystore release.keystore \
          -alias crypto-safe-key \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass github-action-temp \
          -keypass github-action-temp \
          -dname "CN=CryptoSafe App, OU=OpenSource, O=Community, L=Unknown, ST=Unknown, C=XX" \
          -deststoretype pkcs12

      - name: Build Release APK
        run: gradle assembleRelease
        env:
          RELEASE_KEYSTORE: release.keystore
          RELEASE_KEYSTORE_PASSWORD: github-action-temp
          RELEASE_KEY_ALIAS: crypto-safe-key
          RELEASE_KEY_PASSWORD: github-action-temp

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: CryptoSafe-Release
          path: app/build/outputs/apk/release/app-release.apk
